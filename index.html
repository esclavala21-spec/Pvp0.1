<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Combate por Turnos</title>
    
    <style>
        /* CSS: El aspecto visual */
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #escenario {
            display: flex;
            gap: 50px;
            margin-bottom: 20px;
            background: #333;
            padding: 20px;
            border-radius: 15px;
            border: 4px solid #555;
        }

        .personaje {
            width: 200px;
        }

        .sprite {
            width: 120px;
            height: 120px;
            background-color: #444;
            border-radius: 10px;
            margin-bottom: 10px;
            object-fit: contain;
        }

        .barra-vida {
            width: 100%;
            height: 20px;
            background-color: red;
            border: 2px solid white;
            border-radius: 5px;
        }

        .vida-actual {
            height: 100%;
            background-color: #2ecc71;
            width: 100%; /* Esto bajará con el JS */
            transition: width 0.3s ease;
        }

        #controles {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
        }

        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover { background-color: #c0392b; }

        #log {
            margin-top: 15px;
            font-size: 14px;
            color: #f1c40f;
            min-height: 40px;
        }
    </style>
</head>
<body>

    <h1>BATALLA RPG</h1>

    <div id="escenario">
        <div class="personaje">
            <h3 id="nombre-p1">PROTAGONISTA 1</h3>
            <img id="img-p1" src="https://raw.githubusercontent.com/esclavala21-spec/Pvp0.1/573aacff905e5382c2968a7487c3038074fb3934/1767433552895.jpg" class="sprite">
            <div class="barra-vida"><div id="hp-barra-p1" class="vida-actual"></div></div>
            <p>HP: <span id="hp-texto-p1">100</span>/100</p>
        </div>

        <div class="personaje">
            <h3>ENEMIGO</h3>
            <img id="img-p2" src="https://via.placeholder.com/120?text=Monstruo" class="sprite">
            <div class="barra-vida"><div id="hp-barra-p2" class="vida-actual"></div></div>
            <p>HP: <span id="hp-texto-p2">100</span>/100</p>
        </div>
    </div>

    <div id="controles">
        <button onclick="atacar()">¡ATACAR!</button>
        <p id="log">¡La batalla ha comenzado! Tu turno.</p>
    </div>

    <script>
        // JAVASCRIPT: La lógica de datos
        let hpJugador = 100;
        let hpEnemigo = 100;

        // Tu función Random reutilizable (1 al 10)
        function obtenerFactor() {
            return Math.floor(Math.random() * 10) + 1;
        }

        function atacar() {
            if (hpJugador <= 0 || hpEnemigo <= 0) return;

            // --- TURNO JUGADOR ---
            let factorAtaque = obtenerFactor();
            let log = document.getElementById("log");

            if (factorAtaque === 1) {
                log.innerText = "¡Fallaste! El enemigo esquivó.";
            } else {
                let danio = factorAtaque + 10; // Daño base 10 + el random
                hpEnemigo -= danio;
                log.innerText = "¡Atacas! Causas " + danio + " de daño.";
            }

            // --- TURNO ENEMIGO (Si sigue vivo) ---
            if (hpEnemigo > 0) {
                setTimeout(() => {
                    let factorEnemigo = obtenerFactor();
                    if (factorEnemigo <= 2) {
                        log.innerText += " | ¡Esquivaste el golpe enemigo!";
                    } else {
                        let danioE = 8 + factorEnemigo;
                        hpJugador -= danioE;
                        log.innerText += " | El enemigo te quita " + danioE + " HP.";
                    }
                    actualizarInterfaz();
                }, 600);
            } else {
                hpEnemigo = 0;
                log.innerText = "¡VICTORIA! El enemigo ha sido derrotado.";
            }

            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            // Actualizar textos
            document.getElementById("hp-texto-p1").innerText = hpJugador > 0 ? hpJugador : 0;
            document.getElementById("hp-texto-p2").innerText = hpEnemigo > 0 ? hpEnemigo : 0;

            // Actualizar barras visuales
            document.getElementById("hp-barra-p1").style.width = (hpJugador > 0 ? hpJugador : 0) + "%";
            document.getElementById("hp-barra-p2").style.width = (hpEnemigo > 0 ? hpEnemigo : 0) + "%";

            if (hpJugador <= 0) {
                document.getElementById("log").innerText = "HAS CAÍDO EN COMBATE...";
                hpJugador = 0;
            }
        }
    </script>
</body>
</html>
